<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 — 扭蛋樂園</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <h1>🎰 扭蛋樂園</h1>
    <form id="login-form">
      <div class="form-group">
        <label for="username">帳號</label>
        <input type="text" id="username" name="username" placeholder="輸入帳號" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" name="password" placeholder="輸入密碼" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">登入</button>
    </form>
    <p class="auth-footer">還沒有帳號？<a href="/register.html">立即註冊</a></p>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // Already logged in? redirect.
  apiFetch('/api/me').then(() => { location.href = '/'; }).catch(() => {});

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    try {
      await apiFetch('/api/auth/login', {
        method: 'POST',
        body: {
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        },
      });
      location.href = '/';
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
