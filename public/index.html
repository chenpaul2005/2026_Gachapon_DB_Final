<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扭蛋樂園 — 首頁</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav>
  <a href="/index.html" class="nav-brand" title="機台列表">🎰 扭蛋樂園</a>
  <div class="nav-links"></div>
  <a href="/wallet.html" class="nav-balance" id="nav-balance" title="前往錢包儲值">載入中…</a>
  <div class="nav-menu">
    <button class="nav-menu-button" id="btn-user-menu" type="button" aria-expanded="false" aria-controls="user-menu">
      我的功能 ▾
    </button>
    <div class="nav-menu-dropdown" id="user-menu">
      <a href="/inventory.html">我的背包</a>
      <a href="/shipments.html">出貨追蹤</a>
      <button type="button" id="btn-logout">登出</button>
    </div>
  </div>
</nav>

<main>
  <h1 class="page-title">選擇機台</h1>
  <div id="machines-container">
    <div class="spinner"></div>
  </div>
</main>

<script src="/js/api.js"></script>
<script>
  initNav();

  async function loadMachines() {
    const container = document.getElementById('machines-container');
    try {
      const machines = await apiFetch('/api/machines');
      if (machines.length === 0) {
        container.innerHTML = '<p class="empty-state">目前沒有可用的機台</p>';
        return;
      }
      container.innerHTML = '<div class="machines-grid" id="machines-grid"></div>';
      const grid = document.getElementById('machines-grid');
      machines.forEach(m => {
        const a = document.createElement('a');
        a.className = 'machine-card';
        a.href = `/gacha.html?id=${m.machine_id}`;
        a.innerHTML = `
          <img src="${m.image_url}" alt="${m.name}" loading="lazy">
          <div class="machine-card-body">
            <div class="machine-card-name">${m.name}</div>
            <div class="machine-card-desc">${m.description}</div>
            <span class="machine-card-price">每抽 ${m.pull_price} 元</span>
          </div>`;
        grid.appendChild(a);
      });
    } catch (err) {
      if (err.status === 401) return; // initNav will redirect
      container.innerHTML = `<p style="color:var(--danger)">載入失敗：${err.message}</p>`;
    }
  }

  loadMachines();
</script>
</body>
</html>
